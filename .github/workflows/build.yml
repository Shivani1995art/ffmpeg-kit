name: Build FFmpeg Kit Full GPL 16KB

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config \
            curl nasm groff texinfo yasm cmake ninja-build \
            gettext gperf bison flex uuid-dev util-linux

      - name: Fix builds
        run: |
          sudo ln -sf /usr/bin/make /usr/local/bin/gmake || true
          sudo ln -sf /usr/include/uuid/uuid.h /usr/include/uuid.h || true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"

      - name: Set NDK env
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Download sources first
        run: |
          chmod +x android.sh
          # Run with a fake flag to just trigger download then exit
          timeout 120 ./android.sh --enable-gpl --enable-x264 2>/dev/null || true
          # Now patch gen_uuid.c
          find . -name "gen_uuid.c" -exec echo "Found: {}" \;
          find . -name "gen_uuid.c" -exec sed -i 's/while (flock(state_fd, LOCK_EX) < 0)/while (0)/g' {} \;
          find . -name "gen_uuid.c" -exec sed -i 's/flock(state_fd, LOCK_UN);//g' {} \;
          find . -name "gen_uuid.c" -exec sed -i '/#include <sys\/file.h>/d' {} \;
          echo "Patch complete"
          grep -n "flock" $(find . -name "gen_uuid.c" | head -1) || echo "flock removed successfully"

      - name: Build FFmpeg Kit
        run: |
          ./android.sh \
            --enable-gpl \
            --enable-freetype \
            --enable-fribidi \
            --enable-fontconfig \
            --enable-x264

      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== LAST 100 LINES ==="
          tail -100 build.log || echo "No build.log"

      - name: Find AAR
        run: find . -name "*.aar" 2>/dev/null

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-full-gpl-16kb
          path: android/ffmpeg-kit-android-lib/build/outputs/aar/ffmpeg-kit-release.aar
