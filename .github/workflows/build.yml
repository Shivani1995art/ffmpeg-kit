name: Build FFmpeg Kit Full GPL 16KB

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config \
            curl nasm groff texinfo yasm cmake ninja-build \
            gettext gperf bison flex uuid-dev util-linux

      - name: Fix builds
        run: |
          sudo ln -sf /usr/bin/make /usr/local/bin/gmake || true
          sudo ln -sf /usr/include/uuid/uuid.h /usr/include/uuid.h || true
          autoconf --version
          automake --version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"

      - name: Set NDK env
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
    
      - name: Patch libuuid for Android
        run: |
          git clone https://github.com/arthenica/util-linux src/libuuid || true
          # Patch gen_uuid.c to remove flock dependency
          find . -path "*/libuuid/gen_uuid.c" | head -5
          for f in $(find . -path "*/libuuid/gen_uuid.c"); do
            sed -i 's/while (flock(state_fd, LOCK_EX) < 0)/while (0)/g' "$f"
            sed -i 's/flock(state_fd, LOCK_UN);//g' "$f"
            echo "Patched $f"
          done
          
      - name: Build FFmpeg Kit
        run: |
          chmod +x android.sh
          ./android.sh \
            --enable-gpl \
            --enable-freetype \
            --enable-fribidi \
            --enable-fontconfig \
            --enable-x264

      - name: Show build log on failure
        if: failure()
        run: tail -100 build.log

      - name: Find AAR
        run: find . -name "*.aar" 2>/dev/null

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-full-gpl-16kb
          path: android/ffmpeg-kit-android-lib/build/outputs/aar/ffmpeg-kit-release.aar
